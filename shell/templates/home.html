{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-base-200">

  <nav class="navbar bg-base-100 shadow-md px-6">
    <div class="flex-1">
      <span class="text-xl font-bold">Agua Potable Santa Fe</span>
    </div>
    <div class="flex-none gap-2">
      <span class="text-sm text-gray-500">Hello, {{ request.user.username }}</span>
      <a href="{% url 'logout' %}" class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </nav>

  <main class="container mx-auto px-6 py-12">
    <div class="card bg-base-100 shadow-xl max-w-lg mx-auto">
      <div class="card-body items-center text-center gap-4">
        <h1 class="card-title text-3xl font-bold">Welcome! 👋</h1>
        <p class="text-gray-500">You are logged in as <strong>{{ request.user.username }}</strong>.</p>
        <div class="badge badge-primary badge-lg">System Online</div>
      </div>
    </div>
  </main>

</body>
</html>
